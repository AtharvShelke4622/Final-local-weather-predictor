services:
  type: web
  name: weather-backend
  env: python
  plan: free
  buildCommand: "pip install -r config/backend_requirements.txt && python -m uvicorn backend.main:app --host=0.0.0.0 --port=8000"
  startCommand: "python -m uvicorn backend.main:app --host=0.0.0.0 --port=$PORT"
  envVars:
    - key: ENV
      value: production
    - key: MODEL_SERVER_URL
      value: https://final-local-weather-predictor.onrender.com
    - key: DATABASE_URL
      value: sqlite:///app/weather_dashboard.db
    - key: SECRET_KEY
      value: your-secret-key-change-in-production
    - key: REDIS_URL
      value: redis://localhost:6379
