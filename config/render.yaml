services:
  type: web
  name: weather-model-server
  env: python
  plan: free
  buildCommand: "pip install -r config/requirements.txt && python -m uvicorn backend.model_server:app --host=0.0.0.0 --port=8000"
  startCommand: "python -m uvicorn backend.model_server:app --host=0.0.0.0 --port=$PORT"
  envVars:
    - key: NODE_ENV
      value: production
    - key: MODEL_DIR
      value: /app/data/models