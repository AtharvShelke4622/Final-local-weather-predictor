services:
  type: web
  name: weather-backend
  env: python
  plan: free
  buildCommand: "pip install -r config/backend_requirements.txt"
  startCommand: "cd /opt/render/project/src/backend && PYTHONPATH=/opt/render/project/src python -m uvicorn main:app --host=0.0.0.0 --port=$PORT"
  envVars:
    - key: ENV
      value: production
    - key: PYTHONPATH
      value: /opt/render/project/src
